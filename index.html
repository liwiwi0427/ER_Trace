<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>急診心跡 | ER ECG Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="logo">急診心跡 <small style="font-size: 0.6rem; opacity: 0.6;">ADVANCED ACLS TRAINER</small></div>
            <div style="display: flex; gap: 40px;">
                <div class="status-item">STATUS: <span id="status-tag" style="color: var(--accent-green);">STABLE</span></div>
                <button onclick="toggleTheme()" id="theme-btn">切換至紙本模式</button>
            </div>
        </header>

        <!-- 左側面板：數據統計 -->
        <aside class="side-panel" style="background: var(--panel-bg); border-radius: 12px; padding: 20px;">
            <div class="stat-group">
                <label>HEART RATE</label>
                <div class="param-text" id="hr-num">72</div>
            </div>
            <div class="stat-group" style="margin-top: 30px;">
                <label>SpO2 %</label>
                <div class="param-text" style="color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue);">98</div>
            </div>
        </aside>

        <!-- 中間：ECG 畫布 -->
        <main class="monitor-container">
            <canvas id="ecgCanvas"></canvas>
        </main>

        <!-- 右側：電傳導動畫 -->
        <section class="heart-path-panel">
            <h3>心臟電傳導示意</h3>
            <svg class="heart-svg" viewBox="0 0 200 200">
                <!-- 簡化心臟輪廓 -->
                <path d="M100,40 C100,40 150,20 170,60 C190,100 100,170 100,170 C100,170 10,100 30,60 C50,20 100,40 100,40" fill="none" stroke="var(--accent-red)" stroke-width="3"/>
                <!-- 傳導點 -->
                <circle id="node-sa" cx="120" cy="60" r="5" fill="#fff" />
                <circle id="node-av" cx="100" cy="100" r="5" fill="#fff" />
                <path id="bundle-path" d="M100,100 L100,130 L80,160 M100,130 L120,160" stroke="#fff" fill="none" stroke-dasharray="100" stroke-dashoffset="100" />
            </svg>
            <div id="rhythm-info" style="margin-top: 20px; font-size: 0.9rem; line-height: 1.6;">
                <b>目前診斷：</b><br><span id="rhythm-detail">正常竇性心律</span>
            </div>
        </section>

        <!-- 下方：操作台 -->
        <footer class="dock-panel">
            <div class="control-card">
                <h3>基礎與快速心律</h3>
                <div class="btn-grid" id="fast-rhythms"></div>
            </div>
            <div class="control-card">
                <h3>致命性與傳導阻滯</h3>
                <div class="btn-grid" id="lethal-rhythms"></div>
            </div>
            <div class="control-card">
                <h3>ACLS 藥物處置</h3>
                <div class="btn-grid" id="drug-actions"></div>
            </div>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
